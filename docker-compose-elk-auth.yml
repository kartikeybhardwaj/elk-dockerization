services:

  #################################################################
  # Elasticsearch: Search engine
  #################################################################
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./elastic-certificates.p12:/usr/share/elasticsearch/config/elastic-certificates.p12:ro
      - ./elasticsearch-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
    networks:
      - ntw-elk
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  #################################################################
  # Logstash: Events and logs manager
  #################################################################
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./logstash-auth.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - 9600:9600
      - 5044:5044
    networks:
      - ntw-elk
    depends_on:
      elasticsearch:
        condition: service_healthy

  #################################################################
  # Kibana: Data visualization dashboard for Elasticsearch
  #################################################################
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana
    restart: unless-stopped
    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - 5601:5601
    networks:
      - ntw-elk

networks:
  ntw-elk:
    driver: bridge
